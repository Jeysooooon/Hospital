<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Especialidad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h3>Editar Especialidad</h3>
    <form action="" method="POST" class="card p-4 shadow-sm w-50">
        <div class="mb-3">
            <label>Nombre:</label>
            <input type="text" name="EspNombre" class="form-control" value="{{ especialidad.1 }}" required>
        </div>
        <div class="mb-3">
            <label>Descripción:</label>
            <textarea name="EspDescripcion" class="form-control" rows="3" required>{{ especialidad.2 }}</textarea>
        </div>
        <div>
            <input type="submit" value="Actualizar" class="btn btn-warning">
            <a href="/especialidad/" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</body>
</html>
