<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Especialidades</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h3>Listado de Especialidades</h3>
    <a href="/especialidad/agregar" class="btn btn-primary mb-3">Nueva Especialidad</a>
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Código</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for esp in lista_especialidades %}
            <tr>
                <td>{{ esp.0 }}</td>
                <td>{{ esp.1 }}</td>
                <td>{{ esp.2 }}</td>
                <td>
                    <a href="/especialidad/editar/{{ esp.0 }}" class="btn btn-warning btn-sm">Editar</a>
                    <a href="/especialidad/eliminar/{{ esp.0 }}" class="btn btn-danger btn-sm">Eliminar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="/" class="btn btn-secondary">Volver al Inicio</a>
</body>
</html>
