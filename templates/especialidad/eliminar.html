<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Especialidad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <div class="card border-danger shadow w-50">
        <div class="card-header bg-danger text-white"><h4>Confirmar Eliminación</h4></div>
        <div class="card-body">
            <p>¿Estás seguro de que deseas eliminar la especialidad <strong>{{ especialidad.1 }}</strong>?</p>
            <form action="" method="POST">
                <button type="submit" class="btn btn-danger">Sí, Eliminar</button>
                <a href="/especialidad/" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</body>
</html>
