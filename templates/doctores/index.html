<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Doctores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h3>Listado de Doctores</h3>
    <a href="/doctores/agregar" class="btn btn-success mb-3">Nuevo Doctor</a>
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Código</th><th>Nombre</th><th>Apellido</th><th>Especialidad</th><th>Teléfono</th><th>Correo</th><th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for doc in lista_doctores %}
            <tr>
                <td>{{ doc.0 }}</td><td>{{ doc.1 }}</td><td>{{ doc.2 }}</td><td>{{ doc.3 }}</td><td>{{ doc.4 }}</td><td>{{ doc.5 }}</td>
                <td>
                    <a href="/doctores/editar/{{ doc.0 }}" class="btn btn-warning btn-sm">Editar</a>
                    <a href="/doctores/eliminar/{{ doc.0 }}" class="btn btn-danger btn-sm">Eliminar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="/" class="btn btn-secondary">Volver al Inicio</a>
</body>
</html>
