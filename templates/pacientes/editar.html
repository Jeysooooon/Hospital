<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h3>Editar Paciente</h3>
    <form action="" method="POST" class="card p-4 shadow-sm w-50">
        <div class="mb-2"><label>Nombre:</label><input type="text" name="PacNombre" class="form-control" value="{{ paciente.1 }}" required></div>
        <div class="mb-2"><label>Apellido:</label><input type="text" name="PacApellido" class="form-control" value="{{ paciente.2 }}" required></div>
        <div class="mb-2"><label>Identidad (DNI):</label><input type="text" name="PacDNI" class="form-control" value="{{ paciente.3 }}" required></div>
        <div class="mb-2"><label>Teléfono:</label><input type="text" name="PacTelefono" class="form-control" value="{{ paciente.4 }}"></div>
        <div class="mb-3"><label>Dirección:</label><textarea name="PacDireccion" class="form-control" rows="2">{{ paciente.5 }}</textarea></div>
        <div>
            <input type="submit" value="Actualizar" class="btn btn-warning">
            <a href="/pacientes/" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</body>
</html>
